services:
  - type: web
    name: playto-pay-api
    runtime: python
    rootDir: .
    plan: free
    buildCommand: pip install -r requirements.txt && cd backend && python manage.py collectstatic --noinput
    startCommand: cd backend && bash start_render.sh
    healthCheckPath: /api/v1/health
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.9
      - key: DEBUG
        value: 0
      - key: DATABASE_SSL_REQUIRE
        value: 1
      - key: SECRET_KEY
        generateValue: true
      - key: ALLOWED_HOSTS
        value: .onrender.com,localhost,127.0.0.1
      - key: CORS_ALLOWED_ORIGINS
        value: https://playto-pay-dashboard.onrender.com
      - key: RUN_INLINE_PAYOUT_WORKER
        value: 1
      - key: DATABASE_URL
        sync: false
  - type: web
    name: playto-pay-dashboard
    runtime: static
    rootDir: frontend
    buildCommand: npm install && VITE_API_BASE=https://playto-pay-api.onrender.com/api/v1 npm run build
    staticPublishPath: ./dist
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
